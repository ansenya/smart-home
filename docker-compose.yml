services:
  auth:
    build:
      context: ./auth-service
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_HOST}:${REDIS_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      GIN_MODE: ${GIN_MODE}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      TZ: Europe/Moscow
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped

  adapter:
    build:
      context: ./adapter
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      MQTT_URL: tcp://broker:1883
      GIN_MODE: ${GIN_MODE}
      TZ: Europe/Moscow
    depends_on:
      - broker
      - db
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped

  panel-api:
    build:
      context: ./panel-api
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_HOST}:${REDIS_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      GIN_MODE: ${GIN_MODE}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      PANEL_COOKIE_DOMAIN: ${PANEL_COOKIE_DOMAIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: Europe/Moscow
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped

  llm-service:
    build:
      context: ./llm-service
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      GIN_MODE: ${GIN_MODE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_PROXY_URL: ${ANTHROPIC_PROXY_URL:-}
      PROXY_URL: ${PROXY_URL}
      MQTT_URL: tcp://broker:1883
      MQTT_USER: ${MQTT_USER:-user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-superdifficultpassword}
      TZ: Europe/Moscow
    depends_on:
      - broker
      - db
    restart: unless-stopped

  devices-api:
    build:
      context: ./devices-api
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_HOST}:${REDIS_PORT}
      MQTT_URL: tcp://broker:1883
      MQTT_USER: ${MQTT_USER:-user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-superdifficultpassword}
      GIN_MODE: ${GIN_MODE}
      TZ: Europe/Moscow
    depends_on:
      - broker
      - db
      - redis
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped

  auth-web:
    build:
      context: ./auth-web
      args:
        VITE_API_URL: ${VITE_AUTH_WEB_API_URL}
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_OAUTH_PROVIDER_URL: ${VITE_OAUTH_PROVIDER_URL}
        VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID}
    restart: unless-stopped

  nginx:
    image: nginx:1.29
    depends_on:
      - auth
      - auth-web
      - web
      - adapter
      - llm-service
      - devices-api
      - panel-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      TZ: Europe/Moscow
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8.0
    environment:
      TZ: "Europe/Moscow"
    restart: unless-stopped

  broker:
    image: eclipse-mosquitto:2.0.22
    environment:
      TZ: Europe/Moscow
    volumes:
      - ./mosquitto/config:/mosquitto/config # user: user; password: superdifficultpassword
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
